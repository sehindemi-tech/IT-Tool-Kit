name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to apply (dev/staging/prod)"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  contents: read
  id-token: write
  security-events: write
  actions: read

jobs:
  Apply:
    runs-on: ubuntu-latest
    name: Terraform Apply

    steps:
      - name: Git checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.3.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_APPLY_ARN }}
          aws-region: ${{ vars.AWS_REGION }}


      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.2"

      - name: Terraform init
        run: terraform -chdir=infra/environment/${{ inputs.environment }} init

      - name: Terraform apply
        run: terraform -chdir=infra/environment/${{ inputs.environment }} apply --auto-approve

      - name: Post-deploy health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://it-tools.sehindemi.com/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed — status $STATUS"
            exit 1
          fi
