events {}

http {
    include       /etc/nginx/mime.types;
    keepalive_timeout 65;

    server {
        listen 8080;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            default_type application/json;
        }

        location ~ /\.ht {
            deny all;
        }
    }
}
